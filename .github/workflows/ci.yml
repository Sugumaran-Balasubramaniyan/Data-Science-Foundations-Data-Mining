name: CI
on:
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Validate notebooks
        run: pip install jupyter nbconvert nbformat && find . -name '*.ipynb' | while read nb; do python -m nbconvert --to notebook --execute --stdout "$nb" > /dev/null && echo "OK: $nb" || true; done
